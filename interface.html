<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #261f1f;
            color: white;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgb(8, 8, 8);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            text-decoration: none;
            color: black;
            background: white;
            padding: 8px 18px;
            border-radius: 20px;
            margin-left: 10px;
            font-size: 14px;
        }
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 100px;
        }

        .left {
            max-width: 600px;
        }

        .left h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .left h1 {
            font-size: 55px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ccc;
        }

        .btn {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn span {
            margin-left: 10px;
            background: black;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
        }

        /* Profile Card */
        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 250px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: gray;
            border-radius: 50%;
            margin: 0 auto 15px;
        }

        .card h3 {
            margin-bottom: 5px;
        }

        .icons {
            margin-top: 15px;
        }

        .icons i {
            margin: 0 10px;
            cursor: pointer;
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            border: 3px solid white;
}
        .avatar {
  width: 120px;       /* fixed width */
  height: 120px;      /* fixed height */
  object-fit: cover;  /* crops nicely without stretching */
  border-radius: 50%; /* makes it circular */
  border: 3px solid #ff3333;
  display: block;
  margin: 0 auto 15px; /* centers inside the card */
}
    </style>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="navbar">
        <div class="logo">Syed Zaheer Ahmed|</div>
        
    </div>
    <div class="container">
        <div class="left">
            <h3>Hello, I'm</h3>
            <h1>Syed Zaheer Ahmed</h1>
            <p>B.Tech Computer Science Student</p>
            <p>Interested in Web Development.</p>

            <a href="index.html" class="btn">About Me
         <span>➜</span>
            </a>
        </div>
        <div class="card">
            <img src="img/portfolio.png" alt="Student photo" class="avatar"
            <h3><b>SYED ZAHEER AHMED</b></h3></h3>
            <p><i>B.Tech CS Student</i></p>

            <div class="icons">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-github"></i>
            </div>
        </div>

    </div>

</body>
</html>
